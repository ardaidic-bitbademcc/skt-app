name: Android APK Build

on:
  workflow_dispatch:        # Manuel tetikleme (Actions sekmesinden "Run workflow")
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write       # GitHub Release oluşturmak için gerekli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: packages/mobile
        run: npm ci

      - name: Generate native Android project (expo prebuild)
        working-directory: packages/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Create keystore for signing
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK with Gradle
        working-directory: packages/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Publish APK to GitHub Release (sabit indirme linki)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "SKT App – Son APK (Build #${{ github.run_number }})"
          body: |
            Her yeni build'de bu release güncellenir, link değişmez.
            **İndirmek için:** `app-release.apk` dosyasına tıklayın.
          files: packages/mobile/android/app/build/outputs/apk/release/app-release.apk
          prerelease: true
          make_latest: true
